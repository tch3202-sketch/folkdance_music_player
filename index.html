<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>土風舞音樂播放器</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .player-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); width: 90%; max-width: 400px; text-align: center; }
        #status { color: #007bff; margin-bottom: 15px; font-weight: bold; font-size: 14px; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 20px; font-size: 16px; }
        .btn-group { margin-bottom: 20px; }
        button { padding: 8px 15px; border: 1px solid #007bff; background: white; color: #007bff; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button.active { background: #007bff; color: white; }
        audio { width: 100%; }
        .footer { margin-top: 15px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="player-card">
    <h2>💃 土風舞音樂播放</h2>
    <div id="status">同步雲端資料中...</div>
    
    <select id="songList">
        <option value="">-- 請選擇舞曲 --</option>
    </select>

    <div class="btn-group">
        <button id="btnLoop" onclick="setMode('loop')" class="active">連續播放</button>
        <button id="btnSingle" onclick="setMode('single')">單曲播放</button>
    </div>

    <audio id="audioPlayer" controls></audio>
    <div class="footer">資料來源：Google 試算表 (前 40 首)</div>
</div>



<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/1nemYcOin9E3LL6nbDEqAZgDqBNzzvZPaHikAwmwVtY8/edit?usp=sharing';
    
    let songs = [];
    let currentIndex = 0;
    let playMode = 'loop'; 

    const player = document.getElementById('audioPlayer');
    const songList = document.getElementById('songList');
    const statusTxt = document.getElementById('status');

    fetch(CSV_URL)
        .then(res => res.text())
        .then(csvText => {
            // 1. 分割列，並過濾掉空行
            const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== "");
            songs = [];

            lines.forEach((line, index) => {
                if (index === 0) return; // 跳過標題
                
                // 2. 使用正則表達式分割 CSV，能處理包含逗號的引號內容
                const cols = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                
                if (cols) {
                    const cleanCols = cols.map(c => c.replace(/^"|"$/g, '').trim());
                    
                    // 3. 根據您的圖片：歌名在 C 欄 (Index 2)，ID 在 I 欄 (Index 8)
                    const title = cleanCols[2] || "未命名舞曲";
                    const id = cleanCols[8] || "";

                    // 只要 ID 欄位不是空的，且不是網址，就視為 ID
                    if (id && !id.includes('http') && id.length > 5) {
                        songs.push({ title: title, id: id });
                    }
                }
            });

            // 只要前 40 首
            songs = songs.slice(0, 40);

            if (songs.length > 0) {
                renderList();
                statusTxt.style.color = "#28a745";
                statusTxt.innerText = `✅ 成功載入 ${songs.length} 首舞曲`;
            } else {
                // --- 偵錯顯示：如果還是失敗，顯示第一行內容幫助判斷 ---
                const debugInfo = lines[1] ? lines[1].substring(0, 30) : "無資料";
                statusTxt.style.color = "#d9534f";
                statusTxt.innerText = `❌ 解析失敗。第一列樣本：${debugInfo}...`;
            }
        })
        .catch(err => {
            statusTxt.style.color = "#d9534f";
            statusTxt.innerText = "❌ 連線失敗，請檢查網路";
        });

    function renderList() {
        songList.innerHTML = '<option value="">-- 請選擇舞曲 --</option>';
        songs.forEach((song, index) => {
            const opt = document.createElement('option');
            opt.value = index;
            opt.innerText = `${index + 1}. ${song.title}`;
            songList.appendChild(opt);
        });
    }

    songList.onchange = function() {
        if (this.value !== "") {
            currentIndex = parseInt(this.value);
            playSong(currentIndex);
        }
    };

    function playSong(index) {
        const song = songs[index];
        // 拼接最穩定的播放連結
        const streamUrl = `https://google.com{song.id}`;
        statusTxt.style.color = "#007bff";
        statusTxt.innerText = "🎵 正在播放：" + song.title;
        player.src = streamUrl;
        player.play().catch(() => {
            statusTxt.style.color = "orange";
            statusTxt.innerText = "⚠️ 播放失敗，請檢查雲端權限";
        });
        songList.value = index;
    }

    player.onended = function() {
        if (playMode === 'loop') {
            currentIndex = (currentIndex + 1) % songs.length;
            playSong(currentIndex);
        }
    };

    function setMode(mode) {
        playMode = mode;
        document.getElementById('btnSingle').className = mode === 'single' ? 'active' : '';
        document.getElementById('btnLoop').className = mode === 'loop' ? 'active' : '';
    }
</script>




   

</body>
</html>
